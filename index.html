<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Теплиці</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      margin: 0;
      padding: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      max-width: 1030px;
      margin: 0 auto 25px auto;
    }

    .card {
      background:
        linear-gradient(180deg, var(--accent-bg, #1f2933), #1f2933 68%),
        #1f2933;
      border-top: 4px solid var(--accent, #80cbc4);
      border-radius: 14px;
      padding: 22px 18px;
      text-align: center;
      box-shadow: 0 0 10px #0006;
      cursor: pointer;
    }

    .card.active {
      box-shadow: 0 0 0 2px var(--accent, #80cbc4), 0 0 16px #0008;
    }

    .num {
      color: var(--accent-soft, #80cbc4);
      font-size: 18px;
      font-weight: 700;
      opacity: 0.8;
    }

    .temp {
      color: var(--accent, #ffffff);
      font-size: 44px;
      font-weight: bold;
      margin-top: 8px;
    }

    .chart-layout {
      max-width: 1000px;
      margin: 0 auto;
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }

      .temp {
        font-size: 38px;
      }
    }

    .chart-box {
      background: #1f2933;
      border-radius: 14px;
      padding: 14px;
      position: relative;
      flex: 1;
      min-width: 0;
      height: 420px;
    }

    .zoom-controls {
      position: absolute;
      right: 18px;
      top: 16px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .zoom-controls button {
      width: 32px;
      height: 28px;
      border: 1px solid #ffffff24;
      border-radius: 8px;
      background: #101820cc;
      color: #dbe7ef;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .zoom-controls button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .sensor-strip {
      max-width: 1000px;
      margin: 10px auto 0 auto;
      color: #dbe7ef;
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 14px;
    }

    .sensor-title {
      color: #ffffffb8;
      font-weight: 700;
    }

    .sensor-item {
      color: var(--accent, #dbe7ef);
      white-space: nowrap;
    }

    .sensor-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 2px #ffffff1f;
      margin: 0 4px;
      vertical-align: -1px;
    }

    .sensor-dot.on {
      background: #22c55e;
    }

    .status {
      text-align: center;
      margin-top: 16px;
      opacity: 0.75;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="grid" id="greenhouses"></div>

  <div class="chart-layout">
    <div class="chart-box">
      <canvas id="tempChart"></canvas>
      <div class="zoom-controls">
        <button id="zoomInBtn" onclick="changeHours(-1)" title="Наблизити">+</button>
        <button id="zoomOutBtn" onclick="changeHours(1)" title="Віддалити">-</button>
      </div>
    </div>
  </div>

  <div class="sensor-strip" id="sensorStrip"></div>

  <div class="status" id="status">Завантаження...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwOMKldCpFBbbGX9tazvOscThYVhkMGtziHSUDFFLxjzGStIfJ9JshrkgV25r80vMHcZw/exec';

    let tempChart = null;
    const GREENHOUSE_COUNT = 4;
    const GREENHOUSE_COLORS = {
      green1: { main: '#4FC3F7', soft: '#9BE2FF', bg: '#173140' },
      green2: { main: '#81C784', soft: '#B7E3B9', bg: '#1D3324' },
      green3: { main: '#FFB74D', soft: '#FFD59A', bg: '#3A2A17' },
      green4: { main: '#BA68C8', soft: '#D9A2E3', bg: '#33213A' }
    };

    let chartSettings = JSON.parse(localStorage.getItem('chartSettings')) || {
      hours: 3,
      mode: 'temps',
      selectedGreenhouse: null,
      showSetpoints: false,
      visible: {
        green1: true,
        green2: true,
        green3: true,
        green4: true
      },
      setpoints: {
        green1: false,
        green2: false,
        green3: false,
        green4: false
      }
    };

    if (!chartSettings.mode) {
      chartSettings.mode = 'temps';
    }
    if (chartSettings.mode === 'setpoints') {
      chartSettings.mode = 'temps';
      chartSettings.showSetpoints = true;
    }
    if (!Object.prototype.hasOwnProperty.call(chartSettings, 'selectedGreenhouse')) {
      chartSettings.selectedGreenhouse = null;
    }
    if (!Object.prototype.hasOwnProperty.call(chartSettings, 'showSetpoints')) {
      chartSettings.showSetpoints = false;
    }
    if (!chartSettings.visible) {
      chartSettings.visible = {};
    }
    if (!chartSettings.setpoints) {
      chartSettings.setpoints = {};
    }
    for (let i = 1; i <= GREENHOUSE_COUNT; i++) {
      const id = 'green' + i;
      if (chartSettings.visible[id] === undefined) {
        chartSettings.visible[id] = true;
      }
      if (chartSettings.setpoints[id] === undefined) {
        chartSettings.setpoints[id] = false;
      }
    }

    function saveChartSettings() {
      localStorage.setItem('chartSettings', JSON.stringify(chartSettings));
    }

    function setHours(h) {
      chartSettings.hours = h;
      saveChartSettings();
      updateZoomButtons();
      loadData();
    }

    function changeHours(direction) {
      const steps = [3, 6, 12];
      const index = Math.max(0, steps.indexOf(Number(chartSettings.hours)));
      const nextIndex = Math.max(0, Math.min(steps.length - 1, index + direction));
      setHours(steps[nextIndex]);
    }

    function updateZoomButtons() {
      const zoomOut = document.getElementById('zoomOutBtn');
      const zoomIn = document.getElementById('zoomInBtn');
      if (!zoomOut || !zoomIn) return;

      zoomIn.disabled = Number(chartSettings.hours) <= 3;
      zoomOut.disabled = Number(chartSettings.hours) >= 12;
    }

    function selectGreenhouse(greenhouse) {
      chartSettings.mode = 'greenhouse';
      chartSettings.selectedGreenhouse = Number(greenhouse);
      chartSettings.showSetpoints = true;
      saveChartSettings();
      loadData();
    }

    function handleChartClick(event, elements, chart) {
      const area = chart.chartArea;
      const point = getChartClickPoint(event);
      const x = point.x;
      const y = point.y;

      const insidePlot = x >= area.left && x <= area.right && y >= area.top && y <= area.bottom;
      const hit = chart.getElementsAtEventForMode(
        event.native,
        'nearest',
        { intersect: true },
        false
      );

      if (insidePlot && hit.length === 0) {
        if (chartSettings.mode !== 'temps' || chartSettings.selectedGreenhouse !== null) {
          chartSettings.mode = 'temps';
          chartSettings.selectedGreenhouse = null;
          chartSettings.showSetpoints = false;
        } else {
          chartSettings.showSetpoints = !chartSettings.showSetpoints;
        }

        saveChartSettings();
        loadData();
      }
    }

    function getChartClickPoint(event) {
      if (Number.isFinite(event.x) && Number.isFinite(event.y)) {
        return { x: event.x, y: event.y };
      }

      const nativeEvent = event.native || event;
      return {
        x: nativeEvent.offsetX,
        y: nativeEvent.offsetY
      };
    }

    async function loadData() {
      const box = document.getElementById('greenhouses');
      const status = document.getElementById('status');

      try {
        const res = await fetch(API_URL + '?hours=' + chartSettings.hours);
        const data = await res.json();

        box.innerHTML = '';

        (data.current || []).filter(item => Number(item.greenhouse) <= GREENHOUSE_COUNT).forEach(item => {
          const temp = Number(String(item.temp).replace(',', '.'));
          const id = 'green' + item.greenhouse;
          const colors = getGreenhouseColors(id);
          const active = chartSettings.mode === 'greenhouse' &&
            Number(chartSettings.selectedGreenhouse) === Number(item.greenhouse);

          box.innerHTML += `
            <div class="card ${active ? 'active' : ''}" onclick="selectGreenhouse(${Number(item.greenhouse)})" style="--accent: ${colors.main}; --accent-soft: ${colors.soft}; --accent-bg: ${colors.bg};">
              <div class="num">Теплиця ${item.greenhouse}</div>
              <div class="temp">${isNaN(temp) ? '--' : temp.toFixed(1)}°C</div>
            </div>
          `;
        });

        drawChart(data.chart || []);
        renderSensors(data.sensors || []);
        updateZoomButtons();

        status.textContent = 'Оновлено: ' + new Date().toLocaleTimeString('uk-UA') +
          ' · ' + chartSettings.hours + ' год';

      } catch (err) {
        console.error(err);
        status.textContent = 'Помилка завантаження даних';
      }
    }

    function renderSensors(sensors) {
      const strip = document.getElementById('sensorStrip');
      const visibleSensors = compactSensors(sensors);

      if (visibleSensors.length === 0) {
        strip.innerHTML = '';
        return;
      }

      strip.innerHTML = '<span class="sensor-title">Сенсори:</span> ' + visibleSensors.map(sensor => {
        const id = Number(sensor.id);
        const colors = getGreenhouseColors('green' + id);
        const voltage = formatVoltage(sensor.u_sens);
        const rssi = formatRssi(sensor.ack_rssi !== '' && sensor.ack_rssi !== undefined ? sensor.ack_rssi : sensor.rx_rssi);
        const online = sensor.online === true;
        const state = online ? 'On' : 'Off';

        return `
          <span class="sensor-item" style="--accent: ${colors.soft};">
            T${id} (<span class="sensor-dot ${online ? 'on' : ''}" title="${state}"></span>${state} ${voltage} ${rssi})
          </span>
        `;
      }).join('');
    }

    function compactSensors(sensors) {
      const byId = {};

      (sensors || []).forEach(sensor => {
        const id = parseSensorId(sensor);
        if (id < 1 || id > GREENHOUSE_COUNT) return;

        if (!byId[id]) {
          byId[id] = {
            id,
            online: false,
            hasOnline: false,
            u_sens: '',
            ack_rssi: '',
            rx_rssi: ''
          };
        }

        const item = byId[id];
        const sensorOnline = readSensorOnline(sensor);
        const voltage = firstDefined(sensor.u_sens, sensor.uSens, sensor.voltage, sensor.v, sensor.U);
        const ackRssi = firstDefined(sensor.ack_rssi, sensor.ackRssi, sensor.ackRSSI);
        const rxRssi = firstDefined(sensor.rx_rssi, sensor.rxRssi, sensor.rssi, sensor.RSSI);

        if (sensorOnline !== null) {
          item.hasOnline = true;
          item.online = item.online || sensorOnline;
        }

        if (isPlausibleVoltage(voltage) && !isPlausibleVoltage(item.u_sens)) {
          item.u_sens = voltage;
        }

        if (isValidRssi(ackRssi) && !isValidRssi(item.ack_rssi)) {
          item.ack_rssi = ackRssi;
        }

        if (isValidRssi(rxRssi) && !isValidRssi(item.rx_rssi)) {
          item.rx_rssi = rxRssi;
        }
      });

      return Object.values(byId).sort((a, b) => a.id - b.id);
    }

    function parseSensorId(sensor) {
      return Number(firstDefined(sensor.GH, sensor.gh, sensor.greenhouse, sensor.id, sensor.ID));
    }

    function readSensorOnline(sensor) {
      const value = firstDefined(sensor.online, sensor.Online, sensor.status, sensor.Status);
      if (value === undefined || value === null || value === '') return null;
      if (value === true || value === 1) return true;
      if (value === false || value === 0) return false;

      const text = String(value).trim().toLowerCase();
      if (text === 'true' || text === '1' || text === 'yes' || text === 'on') return true;
      if (text === 'false' || text === '0' || text === 'no' || text === 'off') return false;
      return null;
    }

    function firstDefined(...values) {
      return values.find(value => value !== undefined && value !== null && value !== '');
    }

    function drawChart(chartData) {
      const labels = chartData.map(row => row.time);

      const datasets = [];

      for (let i = 1; i <= GREENHOUSE_COUNT; i++) {
        const id = 'green' + i;
        const selected = Number(chartSettings.selectedGreenhouse) === i;
        const showTemp = chartSettings.mode === 'temps' ||
          (chartSettings.mode === 'greenhouse' && selected);
        const showSetpoint = (chartSettings.mode === 'temps' && chartSettings.showSetpoints) ||
          (chartSettings.mode === 'greenhouse' && selected);

        if (showTemp) {
          datasets.push({
            label: 'Теплиця ' + i,
            data: chartData.map(row => parseChartNumber(row[id])),
            borderColor: getGreenhouseColors(id).main,
            backgroundColor: getGreenhouseColors(id).main,
            tension: 0.3,
            pointRadius: 0,
            pointHitRadius: 6,
            borderWidth: 2
          });
        }

        if (showSetpoint) {
          datasets.push({
            label: 'Уст.' + i,
            data: chartData.map(row => getSetpointValue(row, i)),
            borderColor: getGreenhouseColors(id).soft,
            backgroundColor: getGreenhouseColors(id).soft,
            tension: 0,
            pointRadius: 0,
            pointHitRadius: 6,
            borderWidth: 2,
            borderDash: [6, 4]
          });
        }
      }

      const ctx = document.getElementById('tempChart').getContext('2d');

      if (tempChart) {
        tempChart.destroy();
      }

      tempChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          onClick: handleChartClick,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              labels: {
                color: 'white'
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  if (context.parsed.y === null) return context.dataset.label + ': --';
                  return context.dataset.label + ': ' + context.parsed.y + '°C';
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: 'white',
                maxTicksLimit: 12
              },
              grid: {
                color: '#ffffff18'
              }
            },
            y: {
              ticks: {
                color: 'white',
                callback: value => value + '°C'
              },
              grid: {
                color: '#ffffff18'
              }
            }
          }
        }
      });
    }

    function parseChartNumber(value) {
      if (value === '' || value === null || value === undefined) return null;

      const n = Number(String(value).replace(',', '.'));
      return isNaN(n) ? null : n;
    }

    function getGreenhouseColors(id) {
      return GREENHOUSE_COLORS[id] || { main: '#FFFFFF', soft: '#CCCCCC', bg: '#1f2933' };
    }

    function formatVoltage(value) {
      const n = Number(String(value).replace(',', '.'));
      return isPlausibleVoltage(value) ? n.toFixed(2) + 'V' : '--V';
    }

    function formatRssi(value) {
      const n = Number(String(value).replace(',', '.'));
      return isValidRssi(value) ? Math.round(n) + 'dBi' : '--dBi';
    }

    function isPlausibleVoltage(value) {
      const n = Number(String(value).replace(',', '.'));
      return !isNaN(n) && n >= 2.0 && n <= 5.5;
    }

    function isValidRssi(value) {
      const n = Number(String(value).replace(',', '.'));
      return !isNaN(n) && n < 0;
    }

    function getSetpointValue(row, index) {
      const keys = [
        'u' + index,
        'U' + index,
        'setpoint' + index,
        'setpoint_' + index,
        'setpoint_c' + index,
        'green' + index + '_u',
        'green' + index + '_U',
        'green' + index + '_setpoint',
        'green' + index + '_setpoint_c',
        'green' + index + 'Setpoint',
        'green' + index + 'U',
        'target' + index,
        'target_' + index
      ];

      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(row, key)) {
          return parseChartNumber(row[key]);
        }
      }

      return null;
    }

    loadData();
    setInterval(loadData, 30000);
  </script>

</body>
</html>
