<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Теплиці</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      margin: 0;
      padding: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      max-width: 1030px;
      margin: 0 auto 25px auto;
    }

    .card {
      background:
        linear-gradient(180deg, var(--accent-bg, #1f2933), #1f2933 68%),
        #1f2933;
      border-top: 4px solid var(--accent, #80cbc4);
      border-radius: 14px;
      padding: 22px 18px;
      text-align: center;
      box-shadow: 0 0 10px #0006;
    }

    .num {
      color: var(--accent-soft, #80cbc4);
      font-size: 18px;
      font-weight: 700;
      opacity: 0.8;
    }

    .temp {
      color: var(--accent, #ffffff);
      font-size: 44px;
      font-weight: bold;
      margin-top: 8px;
    }

    .controls {
      max-width: 1000px;
      margin: 0 auto 12px auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .controls button {
      background: #1f2933;
      color: white;
      border: 1px solid #ffffff33;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .controls button.active {
      background: #2f855a;
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }

      .temp {
        font-size: 38px;
      }
    }

    .chart-box {
      background: #1f2933;
      border-radius: 14px;
      padding: 14px;
      max-width: 1000px;
      margin: 0 auto;
      height: 420px;
    }

    .sensor-strip {
      max-width: 1000px;
      margin: 10px auto 0 auto;
      color: #dbe7ef;
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 14px;
    }

    .sensor-title {
      color: #ffffffb8;
      font-weight: 700;
    }

    .sensor-item {
      color: var(--accent, #dbe7ef);
      white-space: nowrap;
    }

    .sensor-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 2px #ffffff1f;
      margin: 0 4px;
      vertical-align: -1px;
    }

    .sensor-dot.on {
      background: #22c55e;
    }

    .status {
      text-align: center;
      margin-top: 16px;
      opacity: 0.75;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Теплиці</h1>

  <div class="grid" id="greenhouses"></div>

  <div class="controls" id="chartControls"></div>

  <div class="chart-box">
    <canvas id="tempChart"></canvas>
  </div>

  <div class="sensor-strip" id="sensorStrip"></div>

  <div class="status" id="status">Завантаження...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxl3r-M8EHIa0AtFGjEiN3faGfyKuCpyly6Re-43lB66cnUcNPO1ZHRT5TrKtG0ZO-tPQ/exec';

    let tempChart = null;
    const GREENHOUSE_COUNT = 4;
    const GREENHOUSE_COLORS = {
      green1: { main: '#4FC3F7', soft: '#9BE2FF', bg: '#173140' },
      green2: { main: '#81C784', soft: '#B7E3B9', bg: '#1D3324' },
      green3: { main: '#FFB74D', soft: '#FFD59A', bg: '#3A2A17' },
      green4: { main: '#BA68C8', soft: '#D9A2E3', bg: '#33213A' }
    };

    let chartSettings = JSON.parse(localStorage.getItem('chartSettings')) || {
      hours: 3,
      visible: {
        green1: true,
        green2: true,
        green3: true,
        green4: true
      },
      setpoints: {
        green1: false,
        green2: false,
        green3: false,
        green4: false
      }
    };

    if (!chartSettings.setpoints) {
      chartSettings.setpoints = {};
    }
    for (let i = 1; i <= GREENHOUSE_COUNT; i++) {
      const id = 'green' + i;
      if (chartSettings.visible[id] === undefined) {
        chartSettings.visible[id] = true;
      }
      if (chartSettings.setpoints[id] === undefined) {
        chartSettings.setpoints[id] = false;
      }
    }

    function saveChartSettings() {
      localStorage.setItem('chartSettings', JSON.stringify(chartSettings));
    }

    function renderControls() {
      const controls = document.getElementById('chartControls');

      controls.innerHTML = `
        <button onclick="setHours(3)" class="${chartSettings.hours === 3 ? 'active' : ''}">3 год</button>
        <button onclick="setHours(6)" class="${chartSettings.hours === 6 ? 'active' : ''}">6 год</button>
        <button onclick="setHours(12)" class="${chartSettings.hours === 12 ? 'active' : ''}">12 год</button>

        <button onclick="toggleGreen('green1')" class="${chartSettings.visible.green1 ? 'active' : ''}" style="${buttonStyle('green1', chartSettings.visible.green1, false)}">Т1</button>
        <button onclick="toggleGreen('green2')" class="${chartSettings.visible.green2 ? 'active' : ''}" style="${buttonStyle('green2', chartSettings.visible.green2, false)}">Т2</button>
        <button onclick="toggleGreen('green3')" class="${chartSettings.visible.green3 ? 'active' : ''}" style="${buttonStyle('green3', chartSettings.visible.green3, false)}">Т3</button>
        <button onclick="toggleGreen('green4')" class="${chartSettings.visible.green4 ? 'active' : ''}" style="${buttonStyle('green4', chartSettings.visible.green4, false)}">Т4</button>

        <button onclick="toggleSetpoint('green1')" class="${chartSettings.setpoints.green1 ? 'active' : ''}" style="${buttonStyle('green1', chartSettings.setpoints.green1, true)}">U1</button>
        <button onclick="toggleSetpoint('green2')" class="${chartSettings.setpoints.green2 ? 'active' : ''}" style="${buttonStyle('green2', chartSettings.setpoints.green2, true)}">U2</button>
        <button onclick="toggleSetpoint('green3')" class="${chartSettings.setpoints.green3 ? 'active' : ''}" style="${buttonStyle('green3', chartSettings.setpoints.green3, true)}">U3</button>
        <button onclick="toggleSetpoint('green4')" class="${chartSettings.setpoints.green4 ? 'active' : ''}" style="${buttonStyle('green4', chartSettings.setpoints.green4, true)}">U4</button>
      `;
    }

    function setHours(h) {
      chartSettings.hours = h;
      saveChartSettings();
      renderControls();
      loadData();
    }

    function toggleGreen(id) {
      chartSettings.visible[id] = !chartSettings.visible[id];
      saveChartSettings();
      renderControls();
      loadData();
    }

    function toggleSetpoint(id) {
      chartSettings.setpoints[id] = !chartSettings.setpoints[id];
      saveChartSettings();
      renderControls();
      loadData();
    }

    async function loadData() {
      const box = document.getElementById('greenhouses');
      const status = document.getElementById('status');

      try {
        const res = await fetch(API_URL + '?hours=' + chartSettings.hours);
        const data = await res.json();

        box.innerHTML = '';

        (data.current || []).filter(item => Number(item.greenhouse) <= GREENHOUSE_COUNT).forEach(item => {
          const temp = Number(String(item.temp).replace(',', '.'));
          const id = 'green' + item.greenhouse;
          const colors = getGreenhouseColors(id);

          box.innerHTML += `
            <div class="card" style="--accent: ${colors.main}; --accent-soft: ${colors.soft}; --accent-bg: ${colors.bg};">
              <div class="num">Теплиця ${item.greenhouse}</div>
              <div class="temp">${isNaN(temp) ? '--' : temp.toFixed(1)}°C</div>
            </div>
          `;
        });

        drawChart(data.chart || []);
        renderSensors(data.sensors || []);

        status.textContent = 'Оновлено: ' + new Date().toLocaleTimeString('uk-UA');

      } catch (err) {
        console.error(err);
        status.textContent = 'Помилка завантаження даних';
      }
    }

    function renderSensors(sensors) {
      const strip = document.getElementById('sensorStrip');
      const visibleSensors = compactSensors(sensors);

      if (visibleSensors.length === 0) {
        strip.innerHTML = '';
        return;
      }

      strip.innerHTML = '<span class="sensor-title">Сенсори:</span> ' + visibleSensors.map(sensor => {
        const id = Number(sensor.id);
        const colors = getGreenhouseColors('green' + id);
        const voltage = formatVoltage(sensor.u_sens);
        const rssi = formatRssi(sensor.ack_rssi !== '' && sensor.ack_rssi !== undefined ? sensor.ack_rssi : sensor.rx_rssi);
        const online = sensor.online === true || sensor.online === 1 || String(sensor.online).toLowerCase() === 'true';
        const state = online ? 'On' : 'Off';

        return `
          <span class="sensor-item" style="--accent: ${colors.soft};">
            T${id} (<span class="sensor-dot ${online ? 'on' : ''}" title="${state}"></span>${state} ${voltage} ${rssi})
          </span>
        `;
      }).join('');
    }

    function compactSensors(sensors) {
      const byId = {};

      (sensors || []).forEach(sensor => {
        const id = Number(sensor.id);
        if (id < 1 || id > GREENHOUSE_COUNT) return;

        if (!byId[id]) {
          byId[id] = {
            id,
            online: false,
            hasOnline: false,
            u_sens: '',
            ack_rssi: '',
            rx_rssi: ''
          };
        }

        const item = byId[id];
        const sensorOnline = sensor.online === true ||
          sensor.online === 1 ||
          String(sensor.online).toLowerCase() === 'true' ||
          String(sensor.status).toLowerCase() === 'on';

        if (sensor.online !== undefined && sensor.online !== '') {
          item.hasOnline = true;
          item.online = item.online || sensorOnline;
        }

        if (isPlausibleVoltage(sensor.u_sens) && !isPlausibleVoltage(item.u_sens)) {
          item.u_sens = sensor.u_sens;
        }

        if (isValidRssi(sensor.ack_rssi) && !isValidRssi(item.ack_rssi)) {
          item.ack_rssi = sensor.ack_rssi;
        }

        if (isValidRssi(sensor.rx_rssi) && !isValidRssi(item.rx_rssi)) {
          item.rx_rssi = sensor.rx_rssi;
        }
      });

      return Object.values(byId).sort((a, b) => a.id - b.id);
    }

    function drawChart(chartData) {
      const labels = chartData.map(row => row.time);

      const datasets = [];

      for (let i = 1; i <= GREENHOUSE_COUNT; i++) {
        const id = 'green' + i;

        if (chartSettings.visible[id]) {
          datasets.push({
            label: 'Теплиця ' + i,
            data: chartData.map(row => parseChartNumber(row[id])),
            borderColor: getGreenhouseColors(id).main,
            backgroundColor: getGreenhouseColors(id).main,
            tension: 0.3,
            pointRadius: 0,
            borderWidth: 2
          });
        }

        if (chartSettings.setpoints[id]) {
          datasets.push({
            label: 'U' + i,
            data: chartData.map(row => getSetpointValue(row, i)),
            borderColor: getGreenhouseColors(id).soft,
            backgroundColor: getGreenhouseColors(id).soft,
            tension: 0,
            pointRadius: 0,
            borderWidth: 2,
            borderDash: [6, 4]
          });
        }
      }

      const ctx = document.getElementById('tempChart').getContext('2d');

      if (tempChart) {
        tempChart.destroy();
      }

      tempChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              labels: {
                color: 'white'
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  if (context.parsed.y === null) return context.dataset.label + ': --';
                  return context.dataset.label + ': ' + context.parsed.y + '°C';
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: 'white',
                maxTicksLimit: 12
              },
              grid: {
                color: '#ffffff18'
              }
            },
            y: {
              ticks: {
                color: 'white',
                callback: value => value + '°C'
              },
              grid: {
                color: '#ffffff18'
              }
            }
          }
        }
      });
    }

    function parseChartNumber(value) {
      if (value === '' || value === null || value === undefined) return null;

      const n = Number(String(value).replace(',', '.'));
      return isNaN(n) ? null : n;
    }

    function getGreenhouseColors(id) {
      return GREENHOUSE_COLORS[id] || { main: '#FFFFFF', soft: '#CCCCCC', bg: '#1f2933' };
    }

    function buttonStyle(id, active, softTone) {
      const colors = getGreenhouseColors(id);
      const color = softTone ? colors.soft : colors.main;

      if (active) {
        return `background: ${color}; border-color: ${color}; color: #101820;`;
      }

      return `border-color: ${color}; color: ${color};`;
    }

    function formatVoltage(value) {
      const n = Number(String(value).replace(',', '.'));
      return isPlausibleVoltage(value) ? n.toFixed(2) + 'V' : '--V';
    }

    function formatRssi(value) {
      const n = Number(String(value).replace(',', '.'));
      return isValidRssi(value) ? Math.round(n) + 'dBi' : '--dBi';
    }

    function isPlausibleVoltage(value) {
      const n = Number(String(value).replace(',', '.'));
      return !isNaN(n) && n >= 2.0 && n <= 5.5;
    }

    function isValidRssi(value) {
      const n = Number(String(value).replace(',', '.'));
      return !isNaN(n) && n < 0;
    }

    function getSetpointValue(row, index) {
      const keys = [
        'u' + index,
        'U' + index,
        'setpoint' + index,
        'setpoint_' + index,
        'setpoint_c' + index,
        'green' + index + '_u',
        'green' + index + '_U',
        'green' + index + '_setpoint',
        'green' + index + '_setpoint_c',
        'green' + index + 'Setpoint',
        'green' + index + 'U',
        'target' + index,
        'target_' + index
      ];

      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(row, key)) {
          return parseChartNumber(row[key]);
        }
      }

      return null;
    }

    renderControls();
    loadData();
    setInterval(loadData, 30000);
  </script>

</body>
</html>
